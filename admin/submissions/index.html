<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Creator Dashboard | Salt & Sovereignty</title>
    <link rel="stylesheet" href="../../css/styles.css" />
  </head>

  <body>
    <header class="site-header" data-header>
      <nav class="nav" aria-label="Primary navigation">
        <a class="brand" href="../../index.html">
          <span class="brand-mark" aria-hidden="true">S&S</span>
          <span>Salt & Sovereignty</span>
        </a>
      </nav>
    </header>

    <main class="creator-dashboard section">
      <div class="creator-dashboard-header">
        <div>
          <p class="eyebrow">Private Admin</p>
          <h1>Creator Dashboard</h1>
          <p>Review offerings, respond to submitters, track ideas, and curate what belongs in Salt & Sovereignty.</p>
        </div>
      </div>

      <p class="form-status" data-admin-submission-status role="status" aria-live="polite"></p>

      <div class="creator-dashboard-layout">
        <aside class="creator-dashboard-sidebar">
          <button type="button" data-admin-filter="pending">Pending</button>
          <button type="button" data-admin-filter="needs_revision">Needs Revision</button>
          <button type="button" data-admin-filter="approved">Approved</button>
          <button type="button" data-admin-filter="published">Published</button>
          <button type="button" data-admin-filter="rejected">Rejected</button>
          <button type="button" data-admin-filter="archived">Archived</button>
          <button type="button" data-admin-filter="all">All</button>
        </aside>

        <section class="creator-dashboard-inbox">
          <label class="creator-search">
            <span class="sr-only">Search submissions</span>
            <input type="search" placeholder="Search submissions..." data-admin-search />
          </label>

          <div class="admin-submission-list" data-admin-submission-list></div>

          <div class="admin-pagination">
            <button type="button" data-admin-page="prev">← Previous</button>
            <span data-admin-page-label>Page 1</span>
            <button type="button" data-admin-page="next">Next →</button>
          </div>
        </section>

        <section class="creator-dashboard-detail" data-admin-submission-detail>
          <p class="my-sanctuary-empty">Choose a submission to review.</p>
        </section>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/admin-submissions.js"></script>
    <script src="../../script.js"></script>
  </body>
</html>
