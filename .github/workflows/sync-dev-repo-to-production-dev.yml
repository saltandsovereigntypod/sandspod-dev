name: Sync dev repository to production dev branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-dev-repo-to-production-dev
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out sandspod-dev main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone production repository dev branch
        env:
          DEPLOY_TOKEN: ${{ secrets.PROD_REPO_PAT }}
        run: |
          git clone --branch dev --single-branch "https://x-access-token:${DEPLOY_TOKEN}@github.com/saltandsovereigntypod/sandspod.git" /tmp/sandspod

      - name: Copy dev repository files
        run: |
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            ./ /tmp/sandspod/

      - name: Commit and push sync
        working-directory: /tmp/sandspod
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No sync changes to commit."
            exit 0
          fi
          git commit -m "Sync sandspod-dev main to sandspod dev"
          git push origin dev
